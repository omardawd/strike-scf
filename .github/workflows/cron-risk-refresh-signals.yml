name: Cron - Risk Signals Refresh

# Refreshes country/market risk signals daily at 00:00 UTC. Requires repo
# secrets APP_BASE_URL and CRON_SECRET (see cron-agents-tick.yml).
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/risk/refresh-signals
        run: |
          curl -fsS -X GET "${{ secrets.APP_BASE_URL }}/api/risk/refresh-signals" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
