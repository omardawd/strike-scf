name: Cron - Agent Negotiation Tick

# Runs the autonomous negotiation tick loop every 5 minutes. Requires repo
# secrets APP_BASE_URL (e.g. https://app.strikescf.com) and CRON_SECRET
# (must match the CRON_SECRET env var set on the Vercel deployment).
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/agents/tick
        run: |
          curl -fsS -X GET "${{ secrets.APP_BASE_URL }}/api/agents/tick" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
